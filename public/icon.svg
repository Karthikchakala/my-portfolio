<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" ry="80" fill="#0a0a0a"/>
  <rect x="1" y="1" width="510" height="510" rx="79" ry="79" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="256" y="290" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="220" font-weight="600" fill="white" text-anchor="middle" letter-spacing="-8" filter="url(#glow)">CK</text>
</svg>
